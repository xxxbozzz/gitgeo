name: GEO CI — Review + Test

on:
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "batch_generator.py"
      - "auto_publish.py"
      - "backend/**"
      - "knowledge-base/**"
      - "database/**"
      - "scripts/**"
      - "暗涌生文提示词模版"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: geo_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: geo_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geo_app -d geo_engine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pytest-asyncio pytest-anyio

      - name: Init database
        run: |
          PGPASSWORD=test_password psql -h localhost -U geo_app -d geo_engine -f database/init_postgres.sql
        env:
          PGPASSWORD: test_password

      - name: Run tests
        run: |
          DB_HOST=localhost DB_PORT=5432 DB_USER=geo_app DB_PASSWORD=test_password DB_NAME=geo_engine \
          python -m pytest backend/tests/ -v --tb=short
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: geo_app
          DB_PASSWORD: test_password
          DB_NAME: geo_engine

  geo-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GEO PR Review
        id: review
        run: |
          python scripts/geo_pr_review.py \
            --base "origin/${{ github.base_ref || 'main' }}" \
            --head "HEAD" \
            --gh-annotations \
            --json --output geo_review_report.json
        continue-on-error: true

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geo-review-report
          path: geo_review_report.json

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("geo_review_report.json", "utf8"));
            const emoji = report.overall_pass ? "✅" : "❌";
            const status = report.overall_pass ? "通过" : "阻断";
            let body = `## ${emoji} GitGeo GEO CI — ${status}\n\n`;
            body += `**综合评分**: ${report.overall_score.toFixed(2)} | **阻断项**: ${report.blocking_count} | **警告项**: ${report.warning_count}\n\n`;
            body += "### 维度审查\n\n| 维度 | 结果 | 得分 |\n|------|------|------|\n";
            for (const d of report.dimensions) {
              const icon = d.passed ? "✅" : (d.blocking ? "🔴" : "⚠️");
              const result = d.passed ? "PASS" : (d.blocking ? "BLOCKED" : "WARN");
              body += `| ${icon} ${d.dimension} | ${result} | ${d.score.toFixed(2)} |\n`;
            }
            body += `\n---\n🤖 GitGeo GEO CI Bot`;
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body
            });
