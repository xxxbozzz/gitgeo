services:
  # ─── PostgreSQL + pgvector ───
  postgres:
    image: pgvector/pgvector:pg17
    container_name: geo-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-geo_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-password}
      POSTGRES_DB: ${DB_NAME:-geo_engine}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data
      - ./database/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geo_app} -d ${DB_NAME:-geo_engine}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── FastAPI Backend API ───
  backend:
    build: .
    container_name: geo-backend
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-geo_app}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-password}
      - DB_NAME=${DB_NAME:-geo_engine}
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=5
      - GEO_LLM_API_KEY=${GEO_LLM_API_KEY:-}
      - GEO_LLM_BASE_URL=${GEO_LLM_BASE_URL:-https://api.deepseek.com}
      - GEO_LLM_MODEL=${GEO_LLM_MODEL:-deepseek-v4-pro}
      - OPENAI_API_KEY=${GEO_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - OPENAI_BASE_URL=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OTEL_SDK_DISABLED=true
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8001

  # ─── 生产引擎（持续运行）───
  geo-agent-app:
    build: .
    container_name: geo-agent-core
    restart: unless-stopped
    volumes:
      - .:/app
      - ./config/cookies:/app/config/cookies
    environment:
      - GEO_LLM_API_KEY=${GEO_LLM_API_KEY:-}
      - GEO_LLM_BASE_URL=${GEO_LLM_BASE_URL:-https://api.deepseek.com}
      - GEO_LLM_MODEL=${GEO_LLM_MODEL:-deepseek-v4-pro}
      - OPENAI_API_BASE=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - OPENAI_BASE_URL=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - OPENAI_API_KEY=${GEO_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CHROMA_DB_HOST=chromadb
      - CHROMA_DB_PORT=8000
      - CREWAI_TRACING_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-geo_app}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-password}
      - DB_NAME=${DB_NAME:-geo_engine}
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: python -u batch_generator.py

  # ─── Dashboard ───
  dashboard:
    build: .
    container_name: geo-dashboard
    restart: unless-stopped
    volumes:
      - .:/app
      - ./config/cookies:/app/config/cookies
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-geo_app}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-password}
      - DB_NAME=${DB_NAME:-geo_engine}
      - GEO_BACKEND_API_BASE_URL=http://backend:8001/api/v1
      - GEO_BACKEND_API_TIMEOUT=4
      - GEO_BACKEND_ACTION_TIMEOUT=120
      - GEO_LLM_API_KEY=${GEO_LLM_API_KEY:-}
      - GEO_LLM_MODEL=${GEO_LLM_MODEL:-deepseek-v4-pro}
      - OPENAI_API_KEY=${GEO_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - OPENAI_BASE_URL=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - OTEL_SDK_DISABLED=true
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8503:8503"
    command: streamlit run dashboard/app.py --server.port 8503 --server.address 0.0.0.0

  # ─── 定时任务（修复 + 发文 + 内链 + 检测）───
  scheduler:
    build: .
    container_name: geo-scheduler
    restart: unless-stopped
    volumes:
      - .:/app
      - ./config/cookies:/app/config/cookies
    environment:
      - GEO_LLM_API_KEY=${GEO_LLM_API_KEY:-}
      - GEO_LLM_BASE_URL=${GEO_LLM_BASE_URL:-https://api.deepseek.com}
      - GEO_LLM_MODEL=${GEO_LLM_MODEL:-deepseek-v4-pro}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_BASE=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - OPENAI_BASE_URL=${GEO_LLM_BASE_URL:-${OPENAI_BASE_URL:-https://api.deepseek.com}}
      - OPENAI_API_KEY=${GEO_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - OTEL_SDK_DISABLED=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-geo_app}
      - DB_PASSWORD=${DB_PASSWORD:-change-this-password}
      - DB_NAME=${DB_NAME:-geo_engine}
      - GEO_PUBLISH_REQUEST_TIMEOUT=20
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        echo '⏰ 定时任务调度器启动';
        while true; do
          HOUR=\$$(date +%H);
          echo \"[\$$(date)] 当前小时: \$$HOUR\";
          python -u fix_and_link.py 2>&1 | tail -5;
          if [ \"\$$HOUR\" = '08' ]; then
            echo '📤 执行自动发文...';
            python -u auto_publish.py --limit 3 2>&1 | tail -10;
          fi;
          if [ \"\$$HOUR\" = '20' ]; then
            echo '🔍 执行 AI 引用检测...';
            python -u -c 'from core.active_prober import ActiveProber; p=ActiveProber(); print(p.probe(\"行业关键词示例\"))' 2>&1 | tail -5;
          fi;
          echo '💤 休眠 1 小时...';
          sleep 3600;
        done
      "

  # ─── ChromaDB 向量数据库 ───
  chromadb:
    image: chromadb/chroma:latest
    container_name: geo-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./database/chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
